<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mawidy - Help & Support</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col bg-background text-foreground antialiased font-sans">
    
    <!-- Navbar -->
    <header class="sticky top-0 z-40 w-full border-b border-border/60 glass">
        <div class="container mx-auto px-4 md:px-8 flex h-16 items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="relative inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-accent shadow-glow">
                    <svg viewBox="0 0 24 24" class="relative h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18"></path>
                        <path d="M5 21V10l7-5 7 5v11"></path>
                        <path d="M9 21v-7h6v7"></path>
                    </svg>
                </span>
                <span class="font-semibold tracking-tight text-base text-foreground" data-translate="common.appName">موعدي</span>
            </a>

            <!-- Nav Elements -->
            <nav class="flex items-center gap-2">
                <button onclick="toggleLang()" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-muted text-muted-foreground hover:text-foreground">
                    <i data-lucide="languages" class="h-4 w-4"></i>
                    <span id="langBtnText">English</span>
                </button>
                <a href="my-appointments.html" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-muted text-muted-foreground hover:text-foreground">
                    <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
                    <span data-translate="common.dashboard">لوحة التحكم</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto px-4 md:px-8 py-10 max-w-2xl">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-foreground">الدعم الفني والشكاوى</h1>
            <p class="text-sm text-muted-foreground mt-2">يسعدنا دائماً الاستماع إلى استفساراتكم أو شكاواكم لتحسين الخدمة.</p>
        </div>

        <!-- Complaint Form -->
        <div class="bg-card/60 backdrop-blur border border-border/80 rounded-3xl p-6 md:p-8 shadow-elegant">
            <form onsubmit="submitComplaint(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-muted-foreground mb-1.5">عنوان الشكوى (Subject)</label>
                    <input type="text" name="subject" required placeholder="مثال: تأخر في موعد الفحص" class="w-full h-11 px-3.5 rounded-xl border border-border bg-background focus:outline-none focus:border-accent text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-muted-foreground mb-1.5">تفاصيل الشكوى (Details)</label>
                    <textarea name="details" required placeholder="اكتب تفاصيل شكواك أو اقتراحك هنا..." class="w-full min-h-[150px] p-3.5 rounded-xl border border-border bg-background focus:outline-none focus:border-accent text-sm"></textarea>
                </div>

                <button type="submit" class="w-full inline-flex items-center justify-center gap-2 h-11 px-5 rounded-xl bg-gradient-accent text-white font-semibold shadow-soft hover:opacity-95 transition-all">
                    <i data-lucide="send" class="h-4.5 w-4.5"></i>
                    <span>إرسال الشكوى</span>
                </button>
            </form>
        </div>
    </main>

    <footer class="border-t border-border/60 py-8 bg-card text-center text-xs text-muted-foreground">
        © 2026 موعدي - Mw3dy · جميع الحقوق محفوظة
    </footer>

    <script src="js/api.js"></script>
    <script>
        function toggleLang() {
            const nextLang = currentLanguage === 'ar' ? 'en' : 'ar';
            setLanguage(nextLang);
            document.getElementById('langBtnText').innerText = nextLang === 'ar' ? 'English' : 'العربية';
        }

        function submitComplaint(event) {
            event.preventDefault();
            alert(currentLanguage === 'ar' ? 'تم إرسال شكواك بنجاح وسيتواصل معك الدعم الفني قريباً.' : 'Complaint submitted successfully. Our support team will contact you shortly.');
            event.target.reset();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langBtnText').innerText = currentLanguage === 'ar' ? 'English' : 'العربية';
        });
    </script>
</body>
</html>
